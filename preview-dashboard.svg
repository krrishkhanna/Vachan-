  </g>

  <text x="230" y="152" fill="#0F172A" font-size="54" font-family="Segoe UI, Arial, sans-serif" font-weight="800">Vachan Analytics Dashboard</text>
  <text x="230" y="190" fill="#5B6B80" font-size="22" font-family="Segoe UI, Arial, sans-serif">Public claims intelligence with live 60-second refresh, verdict analytics, and CSV export.</text>

  <rect x="987" y="114" width="120" height="44" rx="22" fill="#E7F4FF" stroke="#C7E4F7"/>
  <text x="1012" y="142" fill="#0077B6" font-size="19" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Live data</text>

  <rect x="1122" y="114" width="112" height="44" rx="22" fill="url(#cta)"/>
  <text x="1146" y="142" fill="white" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Export CSV</text>

  <rect x="228" y="238" width="310" height="156" rx="28" fill="white" fill-opacity="0.88" stroke="#E2EEF8"/>
  <text x="258" y="278" fill="#5B6B80" font-size="20" font-family="Segoe UI, Arial, sans-serif">Total claims verified</text>
  <text x="258" y="336" fill="#0F172A" font-size="62" font-family="Segoe UI, Arial, sans-serif" font-weight="800">12,482</text>
  <text x="258" y="370" fill="#5B6B80" font-size="18" font-family="Segoe UI, Arial, sans-serif">Persistent record of every fact-check.</text>

  <rect x="565" y="238" width="310" height="156" rx="28" fill="white" fill-opacity="0.88" stroke="#E2EEF8"/>
  <text x="595" y="278" fill="#5B6B80" font-size="20" font-family="Segoe UI, Arial, sans-serif">Last 24 hours</text>
  <text x="595" y="336" fill="#0F172A" font-size="62" font-family="Segoe UI, Arial, sans-serif" font-weight="800">387</text>
  <text x="595" y="370" fill="#5B6B80" font-size="18" font-family="Segoe UI, Arial, sans-serif">Refreshed automatically every minute.</text>

  <rect x="902" y="238" width="310" height="156" rx="28" fill="white" fill-opacity="0.88" stroke="#E2EEF8"/>
  <text x="932" y="278" fill="#5B6B80" font-size="20" font-family="Segoe UI, Arial, sans-serif">Public API usage</text>
