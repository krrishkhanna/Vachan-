<svg width="1440" height="980" viewBox="0 0 1440 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="160" y1="80" x2="1280" y2="920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FBFF"/>
      <stop offset="1" stop-color="#E8F4FF"/>
    </linearGradient>
    <linearGradient id="card" x1="260" y1="180" x2="1180" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#F8FCFF" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="cta" x1="1030" y1="120" x2="1250" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0077B6"/>
      <stop offset="1" stop-color="#00A6D6"/>
    </linearGradient>
    <filter id="shadow" x="170" y="70" width="1100" height="820" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#005082" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1440" height="980" fill="url(#bg)"/>
  <circle cx="180" cy="120" r="220" fill="#A7DBFF" fill-opacity="0.25"/>
  <circle cx="1270" cy="110" r="160" fill="#BEEAFF" fill-opacity="0.26"/>

